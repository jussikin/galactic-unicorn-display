[target.thumbv6m-none-eabi]
# No debug probe — flash via UF2 over USB. Put the board in BOOTSEL mode
# (mounts as RPI-RP2) before `cargo run --release`; -d deploys to it.
runner = "elf2uf2-rs -d"
rustflags = [
    "-C", "linker=flip-link",
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tlink-rp.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "no-vectorize-loops",
]

[build]
target = "thumbv6m-none-eabi"

[env]
DEFMT_LOG = "debug"
